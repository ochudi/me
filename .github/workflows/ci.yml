name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Builds with no Supabase env on purpose: the read path falls back to
      # the bundled MDX, so a green build here proves the site is resilient
      # to the database being unreachable.
      - run: npm run build
